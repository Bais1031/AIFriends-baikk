<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="bg4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fa709a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fee140;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="face4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffeaa7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fdcb6e;stop-opacity:1" />
    </linearGradient>
  </defs>
  <circle cx="100" cy="100" r="100" fill="url(#bg4)"/>
  <!-- 猫耳头部 -->
  <circle cx="100" cy="95" r="50" fill="url(#face4)" stroke="#f9ca24" stroke-width="2"/>
  <!-- 猫耳朵 -->
  <polygon points="60,60 50,25 80,50" fill="#fdcb6e" stroke="#f9ca24" stroke-width="2"/>
  <polygon points="140,60 150,25 120,50" fill="#fdcb6e" stroke="#f9ca24" stroke-width="2"/>
  <polygon points="63,58 55,32 77,52" fill="#fab1a0" opacity="0.6"/>
  <polygon points="137,58 145,32 123,52" fill="#fab1a0" opacity="0.6"/>
  <!-- 眼睛 -->
  <ellipse cx="82" cy="90" rx="10" ry="12" fill="#2d3436"/>
  <ellipse cx="118" cy="90" rx="10" ry="12" fill="#2d3436"/>
  <circle cx="85" cy="87" r="4" fill="white"/>
  <circle cx="121" cy="87" r="4" fill="white"/>
  <circle cx="79" cy="93" r="2" fill="white" opacity="0.5"/>
