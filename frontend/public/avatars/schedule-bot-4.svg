  <path d="M 92 105 Q 100 112 108 105" fill="none" stroke="#2d3436" stroke-width="2" stroke-linecap="round"/>
  <!-- 胡须 -->
  <line x1="60" y1="95" x2="40" y2="90" stroke="#b2bec3" stroke-width="1.5"/>
  <line x1="60" y1="100" x2="38" y2="102" stroke="#b2bec3" stroke-width="1.5"/>
