<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f093fb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f5576c;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="face2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fff3bf;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ffe066;stop-opacity:1" />
    </linearGradient>
  </defs>
  <circle cx="100" cy="100" r="100" fill="url(#bg2)"/>
  <!-- 可爱圆形头部 -->
  <circle cx="100" cy="90" r="55" fill="url(#face2)" stroke="#fab005" stroke-width="2"/>
  <!-- 头发 -->
  <path d="M 55 75 Q 60 40 100 35 Q 140 40 145 75" fill="#495057"/>
  <!-- 眼睛 - 可爱大眼 -->
  <ellipse cx="80" cy="90" rx="12" ry="14" fill="white"/>
  <ellipse cx="120" cy="90" rx="12" ry="14" fill="white"/>
  <circle cx="82" cy="92" r="7" fill="#495057"/>
  <circle cx="122" cy="92" r="7" fill="#495057"/>
  <circle cx="84" cy="89" r="3" fill="white"/>
  <circle cx="124" cy="89" r="3" fill="white"/>
  <!-- 腮红 -->
  <ellipse cx="65" cy="105" rx="10" ry="6" fill="#ff8787" opacity="0.5"/>
  <ellipse cx="135" cy="105" rx="10" ry="6" fill="#ff8787" opacity="0.5"/>
  <!-- 嘴巴 -->
  <path d="M 90 110 Q 100 120 110 110" fill="none" stroke="#495057" stroke-width="2.5" stroke-linecap="round"/>
  <!-- 身体 -->
  <rect x="70" y="145" width="60" height="35" rx="15" fill="white" opacity="0.9"/>
  <!-- 日历图标 -->
  <rect x="82" y="150" width="36" height="25" rx="4" fill="#f5576c"/>
  <rect x="82" y="150" width="36" height="8" rx="4" fill="#e64980"/>
  <text x="100" y="172" text-anchor="middle" font-size="12" font-weight="bold" fill="white">日程</text>
  <!-- 星星装饰 -->
  <polygon points="160,50 163,58 172,58 165,63 167,72 160,67 153,72 155,63 148,58 157,58" fill="#ffd43b" opacity="0.8"/>
</svg>
