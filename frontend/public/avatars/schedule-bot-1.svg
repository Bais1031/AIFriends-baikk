<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- 背景 -->
  <defs>
    <linearGradient id="bg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="face1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8f9fa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e9ecef;stop-opacity:1" />
    </linearGradient>
  </defs>
  <circle cx="100" cy="100" r="100" fill="url(#bg1)"/>
  <!-- 机器人头部 -->
  <rect x="55" y="50" width="90" height="80" rx="20" fill="url(#face1)" stroke="#dee2e6" stroke-width="2"/>
  <!-- 天线 -->
  <line x1="100" y1="50" x2="100" y2="30" stroke="#adb5bd" stroke-width="3" stroke-linecap="round"/>
  <circle cx="100" cy="25" r="6" fill="#ffd43b"/>
  <!-- 眼睛 -->
  <circle cx="80" cy="85" r="10" fill="#495057"/>
  <circle cx="120" cy="85" r="10" fill="#495057"/>
  <circle cx="83" cy="82" r="3" fill="white"/>
  <circle cx="123" cy="82" r="3" fill="white"/>
  <!-- 嘴巴 -->
  <path d="M 80 105 Q 100 120 120 105" fill="none" stroke="#495057" stroke-width="3" stroke-linecap="round"/>
  <!-- 耳朵 -->
  <rect x="42" y="75" width="13" height="25" rx="6" fill="#adb5bd"/>
  <rect x="145" y="75" width="13" height="25" rx="6" fill="#adb5bd"/>
  <!-- 日历标记 -->
  <rect x="130" y="130" width="40" height="40" rx="8" fill="white" opacity="0.9"/>
  <rect x="130" y="130" width="40" height="12" rx="8" fill="#ff6b6b"/>
  <text x="150" y="160" text-anchor="middle" font-size="16" font-weight="bold" fill="#495057">26</text>
</svg>
